<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Login - Digital Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
     
    <link rel="stylesheet" href="/styles.css">
    <style>
        :root {
            --custom-primary: #02797d;
            --custom-secondary: #6c757d;
            --custom-warning: #ffc107;
        }

        body.loading {
            opacity: 0;
        }

        body {
            opacity: 1;
            transition: opacity 0.3s ease-in;
        }

        .auth-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        .auth-card {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: none;
            border-radius: 1rem;
            max-width: 360px;
            width: 100%;
            aspect-ratio: 0.75;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card .card-body {
            padding: 1.5rem !important;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .auth-logo {
            color: #02797d;
            font-weight: 700;
            font-size: 1.5rem;
            margin: 0;
        }
        .auth-card .text-center {
            margin-bottom: 1rem !important;
        }
        .auth-card .text-center img {
            max-height: 60px !important;
            margin-bottom: 0.5rem !important;
        }
        .auth-card .text-center p {
            font-size: 0.875rem;
            margin: 0.5rem 0 0 0;
        }
        .auth-card .mb-3 {
            margin-bottom: 0.75rem !important;
        }
        .auth-card .mb-4 {
            margin-bottom: 0.75rem !important;
        }
        .auth-card .form-label {
            font-size: 0.875rem;
            margin-bottom: 0.25rem !important;
        }
        .auth-card .form-control {
            font-size: 0.875rem;
            padding: 0.4rem 0.75rem !important;
        }
        .auth-card .btn {
            font-size: 0.875rem;
            padding: 0.5rem 1rem !important;
        }
        .btn-secondary {
            background-color: #02797d;
            border-color: #02797d;
        }
        .btn-secondary:hover {
            background-color: #02797d;
            border-color: #02797d;
        }
        .btn-secondary.btn-error {
            background-color: #dc3545 !important;
            border-color: #dc3545 !important;
        }
        .btn-secondary.btn-error:hover {
            background-color: #c82333 !important;
            border-color: #c82333 !important;
        }
        .btn-outline-primary.btn-highlight {
            background-color: #02797d !important;
            color: white !important;
            border-color: #02797d !important;
            font-weight: 600;
            box-shadow: 0 0 0 3px rgba(2, 121, 125, 0.2);
        }
        .btn-outline-primary.btn-highlight:hover {
            background-color: #016165 !important;
            border-color: #016165 !important;
        }
        .btn-outline-primary {
            color: #02797d;
            border-color: #02797d;
        }
        .btn-outline-primary:hover {
            background-color: #02797d;
            border-color: #02797d;
            color: white;
        }
        .form-control:focus {
            border-color: #02797d;
            box-shadow: 0 0 0 0.2rem rgba(5, 157, 162, 0.25);
        }
        .auth-link {
            color: #02797d;
            text-decoration: none;
        }
        .auth-link:hover {
            color: #02797d;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12">
                    <div class="card auth-card">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div id="logo-container" class="mb-3">
                                    <img src="/images/s-tech-logo-colour.png" alt="S-Tech Logo" style="max-height: 80px; width: auto; margin-bottom: 1rem;">
                                    <div class="auth-logo" id="app-name">Digital Technologies</div>
                                </div>
                                <p class="text-muted">Welcome back! Please sign in to your account.</p>
                            </div>

                            <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
                            <div id="success-message" class="alert alert-success d-none" role="alert"></div>
                            <div id="checking-auth" class="text-center d-none">
                                <div class="spinner-border text-primary mb-3" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="text-muted">Checking authentication...</p>
                            </div>

                            <form id="login-form" class="d-none">
                                <div class="mb-3">
                                    <label for="username" class="form-label fw-semibold">Username</label>
                                    <input type="text" id="username" name="username" class="form-control" required>
                                </div>

                                <div class="mb-4">
                                    <label for="password" class="form-label fw-semibold">Password</label>
                                    <input type="password" id="password" name="password" class="form-control" required>
                                </div>

                                <button type="submit" class="btn btn-secondary w-100 py-2 mb-3" id="login-btn">
                                    Sign In
                                </button>
                            </form>

                            <div id="login-actions" class="text-center d-none">
                                <div class="mb-3">
                                    <p class="mb-2 text-muted">Don't have an account?</p>
                                    <a href="/services/authservice/views/register.html" class="btn btn-outline-primary w-100">Create New Account</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mark page as loading to hide content until branding is applied
        document.body.classList.add('loading');

        // Load and apply branding configuration
        let brandingConfig = null;

        async function loadBranding() {
            try {
                const response = await fetch('/services/authservice/api/branding');
                const result = await response.json();

                if (result.success && result.data) {
                    brandingConfig = result.data;
                    applyBranding();
                }
            } catch (error) {
                console.error('Failed to load branding configuration:', error);
            } finally {
                // Show page (either with branding applied or defaults)
                showPage();
            }
        }

        function applyBranding() {
            if (!brandingConfig) return;

            // Update page title
            if (brandingConfig.appName) {
                document.getElementById('page-title').textContent = `Login - ${brandingConfig.appName}`;
            }

            // Update app name display
            const appNameEl = document.getElementById('app-name');
            if (brandingConfig.appName) {
                appNameEl.textContent = brandingConfig.appName;
            }

            // Add logo if provided (use default S-Tech logo if not)
            const logoContainer = document.getElementById('logo-container');
            const logoUrl = brandingConfig.logoUrl || '/images/s-tech-logo-colour.png';
            logoContainer.innerHTML = `<img src="${logoUrl}" alt="${brandingConfig.appName || 'Logo'}" style="max-height: 80px; width: auto; margin-bottom: 1rem;"><div class="auth-logo" id="app-name">${brandingConfig.appName || 'Digital Technologies'}</div>`;

            // Apply custom colors to CSS variables
            const root = document.documentElement;
            if (brandingConfig.primaryColor) {
                root.style.setProperty('--custom-primary', brandingConfig.primaryColor);
            }
            if (brandingConfig.secondaryColor) {
                root.style.setProperty('--custom-secondary', brandingConfig.secondaryColor);
            }
            if (brandingConfig.warningColor) {
                root.style.setProperty('--custom-warning', brandingConfig.warningColor);
            }

            // Load custom stylesheet if provided
            if (brandingConfig.stylesheetUrl) {
                const stylesheetLink = document.getElementById('custom-stylesheet');
                stylesheetLink.href = brandingConfig.stylesheetUrl;
            }
        }

        function showPage() {
            // Remove loading class to show page with branding applied
            document.body.classList.remove('loading');
        }

        // Load branding on page load
        loadBranding();

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        const createAccountBtn = document.querySelector('a[href*="register"]');

        function showError(message) {
            loginBtn.textContent = message || 'Login failed try again';
            loginBtn.classList.add('btn-error');
            errorMessage.classList.add('d-none');
            successMessage.classList.add('d-none');
            if (createAccountBtn) {
                createAccountBtn.classList.add('btn-highlight');
            }
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.remove('d-none');
            errorMessage.classList.add('d-none');
            loginBtn.classList.remove('btn-error');
            if (createAccountBtn) {
                createAccountBtn.classList.remove('btn-highlight');
            }
        }

        function hideMessages() {
            errorMessage.classList.add('d-none');
            successMessage.classList.add('d-none');
            loginBtn.classList.remove('btn-error');
            loginBtn.textContent = 'Sign In';
            if (createAccountBtn) {
                createAccountBtn.classList.remove('btn-highlight');
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const formData = new FormData(loginForm);
            const urlParams = new URLSearchParams(window.location.search);
            const returnUrl = urlParams.get('returnUrl');

            const loginData = {
                username: formData.get('username'),
                password: formData.get('password')
            };

            // Include returnUrl in request if available
            if (returnUrl) {
                loginData.returnUrl = returnUrl;
            }

            let isRedirecting = false;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Signing in...';

            try {
                const response = await fetch('/services/authservice/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                });

                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('authToken', result.data.session.token);
                    localStorage.setItem('currentUser', JSON.stringify(result.data.user));

                    // Update button to show redirecting status
                    isRedirecting = true;
                    loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Redirecting...';
                    loginBtn.disabled = true;

                    // Use redirectUrl from server response, fallback to returnUrl or default
                    const redirectUrl = result.redirectUrl || returnUrl || '/services';

                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1500);
                } else {
                    showError('Login failed try again');
                }
            } catch (error) {
                showError('Network error - try again');
                console.error('Login error:', error);
            } finally {
                // Only reset button if not redirecting
                if (!isRedirecting) {
                    loginBtn.disabled = false;
                    // Only reset text if button doesn't have error class
                    if (!loginBtn.classList.contains('btn-error')) {
                        loginBtn.textContent = 'Sign In';
                    }
                }
            }
        });

        function checkExistingAuth() {
            const authToken = localStorage.getItem('authToken');
            const checkingDiv = document.getElementById('checking-auth');
            const loginForm = document.getElementById('login-form');
            const loginActions = document.getElementById('login-actions');

            if (authToken) {
                checkingDiv.classList.remove('d-none');

                fetch('/services/authservice/api/validate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token: authToken })
                })
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        // Token is valid, but also verify the session cookie is active
                        // to avoid redirect loops (token valid but no session)
                        return fetch('/api/auth/check', { credentials: 'include' })
                            .then(r => r.json())
                            .then(sessionResult => {
                                if (sessionResult.authenticated) {
                                    const urlParams = new URLSearchParams(window.location.search);
                                    const returnUrl = urlParams.get('returnUrl') || '/services';

                                    showSuccess('Already logged in! Redirecting...');
                                    setTimeout(() => {
                                        window.location.href = returnUrl;
                                    }, 1000);
                                } else {
                                    // Token valid but no session — clear stale token and show login
                                    localStorage.removeItem('authToken');
                                    localStorage.removeItem('currentUser');
                                    showLoginForm();
                                }
                            });
                    } else {
                        localStorage.removeItem('authToken');
                        localStorage.removeItem('currentUser');
                        showLoginForm();
                    }
                })
                .catch(() => {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('currentUser');
                    showLoginForm();
                });
            } else {
                showLoginForm();
            }

            function showLoginForm() {
                checkingDiv.classList.add('d-none');
                loginForm.classList.remove('d-none');
                loginActions.classList.remove('d-none');
            }
        }

        checkExistingAuth();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
